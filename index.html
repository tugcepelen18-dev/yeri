<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#000000">
<title>Nar Çiçeğim Restaurant — Açılış Davetiyesi</title>
<meta name="description" content="Nar Çiçeğim Restaurant büyük açılış davetiyesi.">
<meta property="og:title" content="Nar Çiçeğim Restaurant — Açılış Davetiyesi">
<meta property="og:image" content="assets/kapak.png">
<link rel="preload" as="image" href="assets/kapak.png">
<link rel="preload" as="image" href="assets/davetiye.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&display=swap">
<link rel="stylesheet" href="style.css">
</head>
<body class="is-locked">

  <!-- ============ KAPAK ============ -->
  <section id="cover" class="cover" aria-label="Davetiye kapağı">
    <div class="cover-stage">
      <div class="cover-frame" id="coverFrame">

        <!-- kapak görseli: iki kanat, aynı görselin sol ve sağ yarısı -->
        <div class="leaf leaf-l" id="leafL"><img src="assets/kapak.png" alt="Nar Çiçeğim Restaurant açılış davetiyesi kapağı" decoding="async"></div>
        <div class="leaf leaf-r" id="leafR"><img src="assets/kapak.png" alt="" aria-hidden="true" decoding="async"></div>

        <!-- mühür üzerindeki efekt katmanı (görseli kapatmaz) -->
        <div class="seal-fx" id="sealFx" aria-hidden="true">
          <span class="seal-glow"></span>
          <span class="seal-ring"></span>
          <svg class="seal-crack" viewBox="0 0 100 100" preserveAspectRatio="none">
            <path d="M50 4 L46 26 L54 40 L44 56 L52 72 L48 96" pathLength="1"/>
            <path d="M50 40 L28 30" pathLength="1"/>
            <path d="M50 52 L74 44" pathLength="1"/>
            <path d="M50 66 L26 74" pathLength="1"/>
          </svg>
        </div>

        <button class="seal-hit" id="sealHit" type="button" aria-label="Mühre dokunun, davetiye açılsın">
          <span class="sr-only">Davetiyeyi aç</span>
        </button>
      </div>
    </div>
  </section>

  <!-- ============ EFEKT KATMANI ============ -->
  <canvas id="fx" class="fx" aria-hidden="true"></canvas>
  <div class="flash" id="flash" aria-hidden="true"></div>

  <!-- ============ İÇ DAVETİYE ============ -->
  <main id="invite" class="invite" aria-label="Davetiye" hidden>
    <div class="card" id="card">
      <!-- dilimler script.js tarafından üretilir; her biri orijinal görselin bir bölümüdür -->
    </div>
    <p class="foot-note">Nar Çiçeğim Restaurant · 100. Yıl</p>
  </main>

  <!-- ============ MÜZİK ============ -->
  <button class="music-btn" id="musicBtn" type="button" aria-pressed="false" aria-label="Müziği aç">
    <svg viewBox="0 0 24 24" class="ic-on" aria-hidden="true"><path d="M9 18V6l10-2v12" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/><circle cx="6.5" cy="18" r="2.5" fill="none" stroke="currentColor" stroke-width="1.6"/><circle cx="16.5" cy="16" r="2.5" fill="none" stroke="currentColor" stroke-width="1.6"/></svg>
    <span class="mute-slash" aria-hidden="true"></span>
  </button>

  <!-- ============ KONUM ONAYI ============ -->
  <div class="modal" id="mapModal" role="dialog" aria-modal="true" aria-labelledby="mapTitle" hidden>
    <div class="modal-bg" data-close></div>
    <div class="modal-box" role="document">
      <span class="modal-orn" aria-hidden="true">&#10022;</span>
      <h2 id="mapTitle">Google Haritalar'da açmak istiyor musunuz?</h2>
      <p>Atatürk Mah. 123. Sk. No:45/B Çankaya, Ankara</p>
      <div class="modal-actions">
        <button class="btn btn-gold" id="mapYes" type="button">EVET</button>
        <button class="btn btn-ghost" data-close type="button">VAZGEÇ</button>
      </div>
    </div>
  </div>

  <script src="script.js" defer></script>
</body>
</html>
